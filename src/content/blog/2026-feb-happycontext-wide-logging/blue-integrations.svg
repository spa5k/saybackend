<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img" viewBox="0 0 960 320"><title id="title">Router and adapter layout</title><desc id="desc">Simple three-column blue diagram for integrations, happycontext core, and adapters.</desc><rect width="960" height="320" fill="#f6faff"/><rect width="920" height="280" x="20" y="20" fill="#fff" stroke="#dbeafe" rx="12"/><text x="54" y="56" fill="#1e3a8a" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Router integrations</text><text x="406" y="56" fill="#1e3a8a" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Core</text><text x="718" y="56" fill="#1e3a8a" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Logger adapters</text><rect width="280" height="214" x="40" y="70" fill="#eff6ff" stroke="#bfdbfe" rx="10"/><g fill="#1e40af" font-family="Geist Mono, monospace" font-size="13"><text x="58" y="104">integration/std</text><text x="58" y="132">integration/gin</text><text x="58" y="160">integration/echo</text><text x="58" y="188">integration/fiber</text><text x="58" y="216">integration/fiberv3</text></g><rect width="280" height="214" x="340" y="70" fill="#1d4ed8" rx="10"/><text x="480" y="136" fill="#eff6ff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">happycontext</text><text x="480" y="170" fill="#dbeafe" font-family="Geist Mono, monospace" font-size="13" text-anchor="middle">request scoped context</text><text x="480" y="194" fill="#dbeafe" font-family="Geist Mono, monospace" font-size="13" text-anchor="middle">one canonical event</text><text x="480" y="218" fill="#dbeafe" font-family="Geist Mono, monospace" font-size="13" text-anchor="middle">5 x 3 = 15 combinations</text><rect width="280" height="214" x="640" y="70" fill="#eff6ff" stroke="#bfdbfe" rx="10"/><g fill="#1e40af" font-family="Geist Mono, monospace" font-size="13"><text x="658" y="118">adapter/slog</text><text x="658" y="146">adapter/zap</text><text x="658" y="174">adapter/zerolog</text></g><text x="330" y="164" fill="#2563eb" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">→</text><text x="630" y="164" fill="#2563eb" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">→</text></svg>