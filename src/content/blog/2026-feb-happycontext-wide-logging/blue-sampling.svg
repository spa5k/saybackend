<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img" viewBox="0 0 960 340"><title id="title">Tail sampling flow</title><desc id="desc">Simple blue vertical decision flow for keeping or sampling wide events.</desc><rect width="960" height="340" fill="#f6faff"/><rect width="920" height="300" x="20" y="20" fill="#fff" stroke="#dbeafe" rx="12"/><text x="48" y="58" fill="#1e3a8a" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Tail sampling</text><rect width="420" height="52" x="70" y="84" fill="#eff6ff" stroke="#bfdbfe" rx="8"/><text x="90" y="116" fill="#1e40af" font-family="Geist Mono, monospace" font-size="13">1) event completed (status + duration known)</text><rect width="420" height="52" x="70" y="148" fill="#eff6ff" stroke="#bfdbfe" rx="8"/><text x="90" y="180" fill="#1e40af" font-family="Geist Mono, monospace" font-size="13">2) if error or 5xx then keep</text><rect width="420" height="52" x="70" y="212" fill="#eff6ff" stroke="#bfdbfe" rx="8"/><text x="90" y="244" fill="#1e40af" font-family="Geist Mono, monospace" font-size="13">3) if critical path or slow request then keep</text><rect width="420" height="28" x="70" y="276" fill="#eff6ff" stroke="#bfdbfe" rx="8"/><text x="90" y="295" fill="#1e40af" font-family="Geist Mono, monospace" font-size="13">4) else apply base sampling rate</text><rect width="320" height="84" x="560" y="108" fill="#1d4ed8" rx="10"/><text x="720" y="144" fill="#eff6ff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">KEEP</text><text x="720" y="168" fill="#dbeafe" font-family="Geist Mono, monospace" font-size="13" text-anchor="middle">errors and incidents</text><rect width="320" height="84" x="560" y="212" fill="#2563eb" rx="10"/><text x="720" y="248" fill="#eff6ff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">SAMPLE</text><text x="720" y="272" fill="#dbeafe" font-family="Geist Mono, monospace" font-size="13" text-anchor="middle">healthy traffic only</text><text x="524" y="152" fill="#2563eb" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">→</text><text x="524" y="256" fill="#2563eb" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle">→</text></svg>