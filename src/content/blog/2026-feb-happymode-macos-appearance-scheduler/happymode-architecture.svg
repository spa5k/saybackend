<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" aria-label="happymode architecture diagram" role="img" viewBox="0 0 1200 560"><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0b0f1a"/><stop offset="100%" stop-color="#101827"/></linearGradient><linearGradient id="card" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#111c2e"/><stop offset="100%" stop-color="#0f172a"/></linearGradient><filter id="shadow" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="0" dy="10" flood-color="#000" flood-opacity=".35" stdDeviation="16"/></filter><style>.title{font:800 22px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#e5e7eb;letter-spacing:.5px}.label{font:700 12px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,&quot;Liberation Mono&quot;,&quot;Courier New&quot;,monospace;fill:#a3a3a3;letter-spacing:.9px}.text{font:600 14px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;fill:#d1d5db}.muted{fill:#94a3b8;font:500 13px ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}.pill{fill:#0b1220;stroke:#334155;stroke-width:1}.box{fill:url(#card);stroke:#243247;stroke-width:1.2;rx:18;filter:url(#shadow)}.arrow,.arrow2{stroke:#60a5fa;stroke-width:2.2;fill:none;opacity:.95}.arrow2{stroke:#a78bfa}.dot{fill:#60a5fa}.dot2{fill:#a78bfa}</style><marker id="arrowhead" markerHeight="12" markerWidth="12" orient="auto" refX="10" refY="6"><path fill="#60a5fa" d="M0,0 L12,6 L0,12 z"/></marker><marker id="arrowhead2" markerHeight="12" markerWidth="12" orient="auto" refX="10" refY="6"><path fill="#a78bfa" d="M0,0 L12,6 L0,12 z"/></marker></defs><rect width="1200" height="560" x="0" y="0" fill="url(#bg)" rx="28"/><text x="64" y="70" class="title">happymode: How the app decides and applies Light/Dark</text><text x="64" y="96" class="muted">Location + schedule inputs → decision engine → system appearance change → UI feedback</text><rect width="320" height="160" x="64" y="140" class="box"/><text x="92" y="176" class="label">INPUTS</text><text x="92" y="206" class="text">Coordinate</text><text x="92" y="232" class="muted">Auto (CoreLocation) or manual lat/lng</text><text x="92" y="268" class="text">Schedule</text><text x="92" y="294" class="muted">Sunrise/Sunset or custom daily times</text><rect width="320" height="150" x="64" y="330" class="box"/><text x="92" y="366" class="label">OVERRIDES</text><text x="92" y="396" class="text">Appearance Preference</text><text x="92" y="422" class="muted">Auto • Force Light • Force Dark</text><text x="92" y="452" class="muted">Persists in UserDefaults</text><rect width="370" height="340" x="440" y="140" class="box"/><text x="468" y="176" class="label">ENGINE</text><text x="468" y="206" class="text">ThemeController</text><text x="468" y="232" class="muted">Calculates next transition + menu bar countdown</text><rect width="314" height="76" x="468" y="260" class="pill"/><text x="488" y="290" class="text">SolarCalculator</text><text x="488" y="314" class="muted">Sunrise/sunset + polar day classification</text><rect width="314" height="76" x="468" y="350" class="pill"/><text x="488" y="380" class="text">Custom Schedule</text><text x="488" y="404" class="muted">Daily Light-at / Dark-at transitions</text><rect width="276" height="210" x="860" y="140" class="box"/><text x="888" y="176" class="label">OUTPUT</text><text x="888" y="206" class="text">Apply Appearance</text><text x="888" y="232" class="muted">Apple Events → System Events</text><text x="888" y="258" class="muted">Requires Automation permission</text><rect width="276" height="110" x="860" y="370" class="box"/><text x="888" y="406" class="label">UI</text><text x="888" y="436" class="text">Menu Bar + Settings</text><text x="888" y="462" class="muted">Popover, context menu, tabs, warnings</text><path marker-end="url(#arrowhead)" d="M384 220 C 410 220, 412 220, 440 220" class="arrow"/><circle cx="384" cy="220" r="5" class="dot"/><path marker-end="url(#arrowhead)" d="M384 405 C 410 405, 412 405, 440 405" class="arrow"/><circle cx="384" cy="405" r="5" class="dot"/><path marker-end="url(#arrowhead2)" d="M810 240 C 832 240, 836 240, 860 240" class="arrow2"/><circle cx="810" cy="240" r="5" class="dot2"/><path marker-end="url(#arrowhead2)" d="M810 420 C 832 420, 836 420, 860 420" class="arrow2"/><circle cx="810" cy="420" r="5" class="dot2"/><text x="64" y="525" class="muted">Design goal: the app stays useful even when permissions are denied (manual coordinates + custom times still work).</text></svg>